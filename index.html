<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ચિ. નિરાલી સંગ ચિ. ઓમ</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati&family=Cinzel:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Noto Sans Gujarati', sans-serif;
  background:linear-gradient(to bottom,#fdf6ec,#fff);
  text-align:center;
  color:#5a2d0c;
}

.section {
  padding:50px 20px;
}

h1 {
  font-family:'Cinzel', serif;
  font-size:30px;
  color:#8B0000;
}

.card-img {
  width:90%;
  max-width:500px;
  margin:20px auto;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.button {
  display:inline-block;
  padding:12px 25px;
  background:#8B0000;
  color:white;
  text-decoration:none;
  border-radius:30px;
  margin-top:20px;
}

.countdown {
  font-size:22px;
  margin-top:20px;
  font-weight:bold;
}

input, textarea {
  width:80%;
  padding:10px;
  margin:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

form {
  margin-top:20px;
}
</style>
</head>

<body>

<div class="section">
  <h1>💍 ચિ. નિરાલી સંગ ચિ. ઓમ 💍</h1>
  <p>॥ શ્રી ગણેશાય નમઃ ॥</p>
  <p>વડીલોના આશીર્વાદ સાથે આપને લગ્ન પ્રસંગે સહર્ષ આમંત્રણ</p>
</div>

<div class="section">
  <h2>લગ્ન કાઉન્ટડાઉન</h2>
  <div id="countdown" class="countdown"></div>
</div>

<div class="section">
  <h2>લગ્ન વિગત</h2>
  <p>📅 તારીખ: 26 એપ્રિલ 2026 (રવિવાર)</p>
  <p>📍 સ્થળ: મમાયમોરા પાટીદાર સનાતન સમાજવાડી</p>
  <a href="https://maps.google.com" target="_blank" class="button">સ્થળ જુઓ</a>
</div>

<div class="section">
  <h2>આમંત્રણ પત્રિકા</h2>
  <img src="card1.jpg" class="card-img">
  <img src="card2.jpg" class="card-img">
  <img src="card3.jpg" class="card-img">
  <img src="card4.jpg" class="card-img">
</div>

<div class="section">
  <h2>RSVP</h2>
  <form action="https://formsubmit.co/YOUR_EMAIL@gmail.com" method="POST">
    <input type="text" name="name" placeholder="તમારું નામ" required><br>
    <input type="number" name="guests" placeholder="કેટલા મહેમાનો આવશે?" required><br>
    <textarea name="message" placeholder="શુભેચ્છા સંદેશ"></textarea><br>
    <button type="submit" class="button">મોકલો</button>
  </form>
</div>

<div class="section">
  <p>સ્નેહભરી રાહ જોઇશું ❤️</p>
</div>

<audio autoplay loop>
  <source src="shehnai.mp3" type="audio/mpeg">
</audio>

<script>
var weddingDate = new Date("April 26, 2026 00:00:00").getTime();

var x = setInterval(function() {
  var now = new Date().getTime();
  var distance = weddingDate - now;

  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("countdown").innerHTML =
    days + " દિવસ " + hours + " કલાક " + minutes + " મિનિટ";

  if (distance < 0) {
    clearInterval(x);
    document.getElementById("countdown").innerHTML = "આજે લગ્ન દિવસ 💕";
  }
}, 1000);
</script>

</body>
</html>
